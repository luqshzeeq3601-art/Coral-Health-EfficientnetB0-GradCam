<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/corallogo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Coral Health AI — CNN-based coral reef health classification using EfficientNet-B0 and Grad-CAM explainability." />
    <title>Coral Health AI</title>
    <script>
      // Apply theme before first paint to avoid a flash of the wrong theme (FOUC).
      (function () {
        try {
          var stored = localStorage.getItem("theme");
          var isDark = stored
            ? stored === "dark"
            : window.matchMedia("(prefers-color-scheme: dark)").matches;
          if (isDark) document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
